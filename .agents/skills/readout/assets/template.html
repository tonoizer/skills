<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<style data-readout>
:root{--bg:#faf8f3;--panel:#f2eee5;--ink:#28241f;--muted:#766f64;--line:#ddd6c9;--accent:#315d76;--good:#3e6848;--warn:#826b27;--bad:#8b4040;--side:15rem;color-scheme:light dark}
@media(prefers-color-scheme:dark){:root{--bg:#1d1b18;--panel:#292621;--ink:#ece7dd;--muted:#aaa092;--line:#403b34;--accent:#91bfd3;--good:#9fc7a4;--warn:#d4bd75;--bad:#dda0a0}}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font:17px/1.65 Charter,"Iowan Old Style",Palatino,Georgia,serif}a{color:var(--accent);text-decoration-thickness:.08em;text-underline-offset:.16em}code,pre,.mono,.meta,.kicker,.badge{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}code{background:var(--panel);border-radius:.25rem;padding:.1em .3em;font-size:.84em}pre{overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:.55rem;padding:1rem;line-height:1.5}.layout{display:grid;grid-template-columns:var(--side) minmax(0,1fr);gap:2.5rem;max-width:72rem;margin:auto;padding:0 1.5rem}.toc{position:sticky;top:0;align-self:start;height:100vh;overflow:auto;padding:2.5rem 0}.toc strong{display:block;color:var(--muted);font:700 .68rem/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem}.toc ol{list-style:none;margin:0;padding:0}.toc a{display:block;color:var(--muted);border-left:2px solid var(--line);padding:.25rem .75rem;text-decoration:none;font-size:.85rem}.toc a:hover,.toc a.active{color:var(--accent);border-color:var(--accent)}main{max-width:74ch;padding:2.5rem 0 4rem;min-width:0}.kicker{color:var(--accent);font-size:.7rem;letter-spacing:.09em;text-transform:uppercase}.doc-header{margin-bottom:2.4rem}.doc-header h1{font-size:clamp(2rem,5vw,3.2rem);line-height:1.08;margin:.45rem 0}.subtitle{color:var(--muted);font-size:1.05rem;margin:.5rem 0}.meta{color:var(--muted);font-size:.72rem}section{scroll-margin-top:1.2rem}h2{font-size:1.35rem;border-top:1px solid var(--line);padding-top:.9rem;margin:2.7rem 0 .8rem}h3{font-size:1.08rem;margin:1.7rem 0 .45rem}.callout{background:var(--panel);border:1px solid var(--line);border-radius:.55rem;padding:.85rem 1rem;margin:1.3rem 0}.callout.warn{border-color:var(--warn)}.callout-label{display:block;color:var(--muted);font:700 .68rem/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.08em;text-transform:uppercase}.badge{display:inline-block;border:1px solid currentColor;border-radius:999px;padding:.08rem .45rem;font-size:.67rem}.good{color:var(--good)}.bad{color:var(--bad)}.neutral{color:var(--muted)}.table-wrap{overflow:auto;margin:1.2rem 0}table{width:100%;border-collapse:collapse;font-size:.9rem}th,td{border:1px solid var(--line);padding:.5rem .7rem;text-align:left;vertical-align:top}th{background:var(--panel)}figure{margin:1.6rem 0}figure svg{display:block;width:100%;height:auto;color:var(--ink)}figcaption{color:var(--muted);font-size:.8rem;text-align:center;margin-top:.45rem}details{margin:1rem 0}summary{cursor:pointer;color:var(--accent)}footer.provenance{border-top:1px solid var(--line);color:var(--muted);font-size:.8rem;margin-top:3rem;padding-top:1rem}
@media(max-width:820px){.layout{grid-template-columns:1fr}.toc{position:static;height:auto;padding:1.25rem 0;border-bottom:1px solid var(--line)}.toc a{border-left:0;padding-left:0}main{padding-top:1.25rem}}
</style>
<style data-doc>{{DOCUMENT_STYLES}}</style>
</head>
<body>
<div class="layout">
<nav class="toc" aria-label="Table of contents"><strong>Contents</strong><ol>{{CONTENTS}}</ol></nav>
<main>
<header class="doc-header">
<p class="kicker">{{KICKER}}</p>
<h1>{{HEADING}}</h1>
<p class="subtitle">{{SUBTITLE}}</p>
<p class="meta">{{METADATA}}</p>
</header>
<section id="summary"><h2>Executive summary</h2>{{EXECUTIVE_SUMMARY}}</section>
{{SECTIONS}}
<section id="verification"><h2>Verification and caveats</h2>{{VERIFICATION}}</section>
<footer class="provenance"><p><strong>Provenance.</strong> {{PROVENANCE}}</p></footer>
</main>
</div>
<script data-readout>
(()=>{const links=[...document.querySelectorAll('.toc a[href^="#"]')];if(!('IntersectionObserver'in window))return;const byId=new Map(links.map(a=>[a.hash.slice(1),a]));let active;const observer=new IntersectionObserver(entries=>entries.forEach(e=>{if(!e.isIntersecting)return;active?.classList.remove('active');active=byId.get(e.target.id);active?.classList.add('active')}),{rootMargin:'0px 0px -72% 0px'});byId.forEach((_,id)=>{const el=document.getElementById(id);if(el)observer.observe(el)})})();
</script>
</body>
</html>
