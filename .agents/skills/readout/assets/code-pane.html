<style data-code-pane>
body.has-code-pane .layout{max-width:none;margin-right:min(42vw,46rem)}#code-pane{position:fixed;z-index:20;inset:0 0 0 auto;width:min(42vw,46rem);display:none;flex-direction:column;background:var(--panel);border-left:1px solid var(--line);box-shadow:-10px 0 30px #0002}body.has-code-pane #code-pane{display:flex}.code-pane-head{display:flex;gap:.75rem;align-items:center;padding:.7rem .9rem;border-bottom:1px solid var(--line)}.code-pane-head strong{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font:600 .78rem/1.3 ui-monospace,SFMono-Regular,Menlo,monospace}.code-pane-head a{margin-left:auto;font-size:.75rem}.code-pane-head button{border:1px solid var(--line);border-radius:.35rem;background:var(--bg);color:var(--ink);cursor:pointer;padding:.2rem .5rem}.code-pane-body{overflow:auto;padding:.7rem 0}.code-window{margin:0 0 1rem;border:0;border-radius:0;padding:.7rem 0;background:var(--bg)}.code-line{display:grid;grid-template-columns:4.4rem minmax(max-content,1fr);min-height:1.35rem}.code-line .ln{color:var(--muted);text-align:right;padding-right:1rem;user-select:none}.code-line .src{white-space:pre;padding-right:1rem}.code-gap{color:var(--muted);padding:.25rem 1rem;text-align:center}@media(max-width:900px){body.has-code-pane .layout{margin-right:0}#code-pane{inset:auto 0 0;width:100%;height:55vh;border-left:0;border-top:1px solid var(--line)}}
</style>
<aside id="code-pane" aria-label="Referenced source code" aria-hidden="true"><div class="code-pane-head"><strong id="code-pane-title">Source</strong><a id="code-pane-link" target="_blank" rel="noreferrer">GitHub</a><button id="code-pane-close" type="button" aria-label="Close source pane">Close</button></div><div class="code-pane-body" id="code-pane-body"></div></aside>
<script data-code-pane>
(()=>{const blob=document.querySelector('script[data-code-snippets]');if(!blob)return;let snippets;try{snippets=JSON.parse(blob.textContent)}catch{return}const pane=document.getElementById('code-pane'),title=document.getElementById('code-pane-title'),out=document.getElementById('code-pane-body'),sourceLink=document.getElementById('code-pane-link');const esc=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));const keyFor=a=>{try{const u=new URL(a.href);const m=u.pathname.match(/^\/([^/]+)\/([^/]+)\/blob\/([0-9a-f]{40})\/(.+)$/i);return m?`${m[1].toLowerCase()}/${m[2].toLowerCase()}@${m[3].toLowerCase()}:${decodeURIComponent(m[4])}`:null}catch{return null}};document.addEventListener('click',e=>{const a=e.target.closest('a[href]');if(!a||e.metaKey||e.ctrlKey||e.shiftKey||e.altKey)return;const key=keyFor(a),entry=key&&snippets[key];if(!entry)return;e.preventDefault();title.textContent=key;sourceLink.href=a.href;out.innerHTML=entry.windows.map((w,i)=>`${i?'<div class="code-gap">⋯</div>':''}<pre class="code-window">${w.text.split('\n').map((line,n)=>`<span class="code-line"><span class="ln">${w.start+n}</span><span class="src">${esc(line)}</span></span>`).join('')}</pre>`).join('');document.body.classList.add('has-code-pane');pane.setAttribute('aria-hidden','false')});const close=()=>{document.body.classList.remove('has-code-pane');pane.setAttribute('aria-hidden','true')};document.getElementById('code-pane-close').addEventListener('click',close);document.addEventListener('keydown',e=>{if(e.key==='Escape')close()})})();
</script>
